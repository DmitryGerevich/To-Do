<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой ToDo-лист</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>📝 Мой список дел</h1>

        <!-- Блок фильтров -->
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <!-- Блок информации и очистки -->
        <div class="info-group">
            <span id="taskCounter">0</span> задач осталось
            <button id="clearAllBtn" class="btn-clear">Очистить все</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Например: выучить JavaScript">
            <button id="addBtn" class="btn-add">➕ Добавить</button>
        </div>
        
        <ul id="taskList">
            <!-- Сюда будут добавляться задачи -->
        </ul>
    </div>

    <script>
        // JavaScript будет здесь
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const taskCounter = document.getElementById('taskCounter');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let tasks = [];
        let currentFilter = 'all';

        // Возвращает массив задач в зависимости от выбранного фильтра
        function getFilteredTasks() {
            if (currentFilter === 'active') {
                // Оставляем только те задачи, у которых completed === false
                return tasks.filter(task => !task.completed);
            } 
            else if (currentFilter === 'completed') {
                // Оставляем только те задачи, у которых completed === true
                return tasks.filter(task => task.completed);
            }
            // 'all' — возвращаем все задачи
            return tasks;
        }

        function renderTasks() {
            // Очищаем список
            taskList.innerHTML = '';
            
            // Получаем отфильтрованные задачи
            const filteredTasks = getFilteredTasks();
            
            // Считаем активные (невыполненные) задачи
            const activeCount = tasks.filter(task => !task.completed).length;
            taskCounter.textContent = activeCount;
            
            // Отображаем только отфильтрованные задачи
            filteredTasks.forEach((task, filteredIndex) => {
                // Находим реальный индекс задачи в ОСНОВНОМ массиве tasks
                const realIndex = tasks.findIndex(t => t === task);
                
                const li = document.createElement('li');
                li.textContent = task.text;
                
                if (task.completed) {
                    li.style.textDecoration = 'line-through';
                    li.style.color = '#888';
                }
                
                // Клик по задаче — меняем статус
                li.addEventListener('click', () => {
                    tasks[realIndex].completed = !tasks[realIndex].completed;
                    saveTasks();
                    renderTasks();
                });
                
                // Кнопка удаления
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '✖';
                deleteBtn.style.marginLeft = '10px';
                deleteBtn.style.cursor = 'pointer';
                
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    tasks.splice(realIndex, 1);
                    saveTasks();
                    renderTasks();
                });
                
                li.appendChild(deleteBtn);
                taskList.appendChild(li);
            });
            
            saveTasks();
        }

        function addTask() {
            // Получаем текст и убираем пробелы по краям
            const text = taskInput.value.trim();
            
            // Проверяем, не пустое ли поле
            if (text === '') {
                alert('Введите текст задачи!');
                return;  // выходим из функции
            }
            
            // Добавляем новую задачу в массив
            tasks.push({
                text: text,
                completed: false
            });
            
            // Очищаем поле ввода
            taskInput.value = '';
            
            // Перерисовываем список
            renderTasks();
        }

        // Очистка всех задач
        function clearAllTasks() {
            if (tasks.length === 0) return;
            
            const confirmed = confirm('Вы уверены, что хотите удалить все задачи?');
            if (confirmed) {
                tasks = [];
                saveTasks();
                renderTasks();
            }
        }

        // Сохранение в localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Загрузка из localStorage
        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            if (saved) {
                tasks = JSON.parse(saved);
            }
            renderTasks();
        }

        addBtn.addEventListener('click', addTask);

        // Добавление по нажатию Enter
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Загружаем задачи при старте
        loadTasks();

        // Обработчик кнопки очистки
        clearAllBtn.addEventListener('click', clearAllTasks);

        // Обработчики для кнопок фильтров
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем класс active у всех кнопок
                filterBtns.forEach(b => b.classList.remove('active'));
                
                // Добавляем класс active текущей кнопке
                btn.classList.add('active');
                
                // Обновляем значение фильтра
                currentFilter = btn.dataset.filter;
                
                // Перерисовываем список с новым фильтром
                renderTasks();
            });
        });

        
    </script>
</body>
</html>
